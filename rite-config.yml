# Claude Code Rite Workflow configuration for this repository (self-hosted)
schema_version: 2

# Project settings
project:
  type: generic

# GitHub Projects integration
github:
  projects:
    enabled: true
    project_number: 6  # cc-rite-workflow project
    owner: "B16B1RD"   # Project owner (user or organization)
    fields:
      status:
        enabled: true
        options:
          - { name: "Todo", default: true }
          - { name: "In Progress" }
          - { name: "In Review" }
          - { name: "Done" }
      priority:
        enabled: true
        options:
          - { name: "High" }
          - { name: "Medium", default: true }
          - { name: "Low" }
      complexity:
        enabled: true
        options:
          - { name: "XS" }
          - { name: "S" }
          - { name: "M", default: true }
          - { name: "L" }
          - { name: "XL" }

# Iteration/Sprint settings (optional)
iteration:
  enabled: false          # true to enable iteration features
  field_name: "Sprint"    # Name of the iteration field in Projects
  auto_assign: true       # Auto-assign to current iteration on issue:start
  show_in_list: true      # Show iteration column in issue:list

# Branch naming rules
branch:
  base: "develop"    # Development base branch (Git Flow)
  pattern: "{type}/issue-{number}-{slug}"

# Commit message
commit:
  contextual: true    # Contextual Commits action lines in commit body

# Build/test/lint commands
commands:
  build: null
  test: null
  lint: null

# Verification gate settings
verification:
  run_tests_before_pr: true          # Run tests before commit/PR (requires commands.test)
  acceptance_criteria_check: true    # Check acceptance criteria from Issue body before PR

# TDD Light mode settings
tdd:
  mode: "off"              # off | light (default: off)
  tag_prefix: "AC"         # Tag prefix for test skeleton markers
  run_baseline: true       # Run baseline test before skeleton generation
  max_skeletons: 20        # Maximum number of skeletons to generate per Issue

# Issue settings
issue:
  auto_decompose_threshold: M  # XS | S | M | L | XL | none — threshold above which issues are auto-decomposed

# Review settings
review:
  min_reviewers: 1      # Fallback when no reviewers match
  criteria:
    - file_types
    - content_analysis
  loop:
    verification_mode: false    # 前回レビューコメントが存在する場合に検証モードを有効化（デフォルト: false）
    allow_new_findings_in_unchanged_code: false  # 未変更コードへの新規指摘を blocking にするか（デフォルト: false）
    # Convergence engine settings (#453)
    convergence_monitoring: true          # サイクル 3+ で収束分析を実行（デフォルト: true）
    severity_gating_cycle_threshold: 5    # 重大度ゲーティングが利用可能になるサイクル数（デフォルト: 5）
    scope_lock_cycle_threshold: 7         # スコープロックが利用可能になるサイクル数（デフォルト: 7）
    auto_propagation_scan: true           # Fix 後に類似パターンの伝播スキャンを実行（デフォルト: true）
    pre_commit_drift_check: true          # コミット前に distributed-fix-drift-check を実行（デフォルト: true）
  security_reviewer:
    mandatory: false                          # 全 PR で必須選定するか（デフォルト: false）
    recommended_for_code_changes: true        # 実行可能コード変更時は推奨（デフォルト: true）
  debate:
    enabled: true            # レビュアー間討論フェーズを有効化（デフォルト: true）
    max_rounds: 1            # 最大討論ラウンド数（コスト制御、デフォルト: 1）
  confidence_threshold: 80   # 指摘事項テーブルに含める最低確信度スコア（デフォルト: 80）
  fact_check:
    enabled: true            # ファクトチェック Phase の有効/無効（デフォルト: true）
    max_claims: 10           # 1レビューあたり最大検証数（デフォルト: 10）
    use_context7: false      # context7 MCP ツールによる検証を使用（デフォルト: false）
  doc_heavy:
    enabled: true                   # Doc-Heavy PR Detection / Override の有効/無効（デフォルト: true）
    lines_ratio_threshold: 0.6      # doc_lines / total_diff_lines の閾値（行数比率、デフォルト: 0.6）
    count_ratio_threshold: 0.7      # doc_files / total_files の閾値（ファイル数比率、デフォルト: 0.7）
    max_diff_lines_for_count: 2000  # ファイル数比率判定を有効にする最大 diff 行数（デフォルト: 2000）

# PR review result recording (#443)
# 上の `review:` セクションは PR レビュー**実行**設定 (reviewer 選定、debate、fact_check 等)、
# 本 `pr_review:` セクションは PR レビュー**出力**設定 (post_comment) という責務分離。
# 出力設定はトップレベルに分離することで、将来 PR コメント以外の出力先 (Slack 通知等) を
# 追加した際に review: の child key を持ち上げる breaking change を避ける。
# デフォルトではレビュー結果を PR コメントには記録せず、タイムスタンプ付き
# ローカルファイル (.rite/review-results/{pr_number}-{timestamp}.json) に保存する。
# /rite:pr:fix は「会話 > ローカルファイル > PR コメント」の優先順位で自動読取する。
pr_review:
  post_comment: false   # true で PR コメント記録を有効化（--post-comment 同等、デフォルト: false）

# Parallel implementation settings
parallel:
  enabled: true   # Enable parallel implementation (default: true)
  max_agents: 3   # Maximum concurrent agents (default: 3)
  mode: "shared"  # "shared" (default, agents share working directory) or "worktree" (each agent gets independent worktree)
  worktree_base: ".worktrees"  # Base directory for worktrees when mode is "worktree" (default: ".worktrees")

# Team-based sprint execution settings
team:
  enabled: true              # Enable /rite:sprint:team-execute (default: true)
  max_concurrent_issues: 3   # Max Issues to process in parallel per batch (default: 3, uses parallel.max_agents if not set)
  teammate_model: "sonnet"   # Model for teammate agents (default: "sonnet")
  auto_review: true          # Auto-run /rite:pr:review after all PRs created (default: true)

# Metrics settings
metrics:
  enabled: true            # Enable/disable metrics recording
  baseline_issues: 3       # Number of Issues for baseline collection (measure-only period)
  # thresholds: 現在コード内にハードコード。将来の動的読み込み実装時に有効化予定
  # thresholds:
  #   plan_deviation_rate: 30       # Max plan vs actual step divergence (%)
  #   test_pass_rate: 100           # Required test pass rate at PR creation (%)
  #   review_fix_loops: 3           # Max acceptable review-fix loop count
  #   review_critical_high_improvement: 0.80  # MA5 improvement factor for CRITICAL+HIGH findings
  #   plan_deviation_improvement: 0.90        # MA5 improvement factor for plan deviation count

# Context optimization settings (#80)
context_optimization:
  agent_delegation: false            # Enable agent delegation for review-fix loop under context pressure
  agent_delegation_threshold: 80     # Tool call count threshold to trigger agent delegation
  pressure_thresholds:
    # All thresholds are phase-aware: impl/lint +10, review/fix +30, default ±0
    yellow: 60                       # Warning threshold
    orange: 90                       # Optimization mode activation threshold
    red: 120                         # Critical / compact recommendation threshold

# Safety settings (fail-closed thresholds)
safety:
  max_implementation_rounds: 20    # implementation round hard limit per Issue
  max_review_fix_loops: 7          # review-fix loop hard limit per PR (convergence engine #453)
  time_budget_minutes: 120         # time budget per Issue (advisory, not enforced by timer)
  auto_stop_on_repeated_failure: true   # stop when same failure class repeats
  repeated_failure_threshold: 3         # consecutive same-class failure count to trigger stop

# Investigation settings
investigate:
  codex_review:
    enabled: true    # false で Phase 6（Codex クロスチェック）をスキップし代替検証を実施

# Workflow incident auto-registration (#366)
# Detects workflow blockers (Skill load failure / hook 異常終了 / 手動 fallback 採用) and
# auto-registers them as Issues to prevent silent loss. See docs/SPEC.md for details.
workflow_incident:
  enabled: true              # true で incident 検出機構を有効化（デフォルト: true）

# Wiki settings (LLM Wiki pattern for experience heuristics)
# See docs/designs/experience-heuristics-persistence-layer.md for full specification.
wiki:
  enabled: false                       # true to enable Wiki features (default: false)
  branch_strategy: "separate_branch"   # "separate_branch" (recommended) or "same_branch"
  branch_name: "wiki"                  # Branch name for Wiki data (when branch_strategy is "separate_branch")
  auto_ingest: true                    # Auto-ingest on review/fix/close (default: true)
  auto_query: true                     # Auto-query on start/review/fix/implement (default: true)

# Language setting
language: ja
